<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<link rel="stylesheet"
href="style.css">

<title>Login</title>

</head>

<body>

<div style="padding:20px">

<h2>Đăng nhập</h2>

<input type="email"
id="email"
placeholder="Email">

<div style="position:relative">

<input type="password"
id="password"
placeholder="Mật khẩu">

<button
id="togglePassword"
style="margin-top:10px">
Hiện mật khẩu
</button>

</div>

<button id="loginBtn">
Đăng nhập
</button>

<button id="googleBtn">
Google Login
</button>

<button id="resetBtn">
Quên mật khẩu
</button>

<a href="register.html">
<button>
Đăng ký
</button>
</a>

</div>

<script type="module"
src="auth.js"></script>

</body>
</html>
